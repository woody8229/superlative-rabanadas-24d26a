<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening PlateShift...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    img { width: 80px; border-radius: 18px; margin-bottom: 20px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; margin-bottom: 24px; }
    a {
      background: #4CAF50;
      color: white;
      padding: 14px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
  <script>
    window.addEventListener('load', function() {
      // Try to open the app
      window.location = "plateshift://ref/kristy";
      // Fall back to App Store after 600ms if app not installed
      setTimeout(function() {
        window.location = "https://apps.apple.com/us/app/plateshift/id6764454446";
      }, 600);
    });
  </script>
</head>
<body>
  <h1>Opening PlateShift...</h1>
  <p>If the app doesn't open automatically, download it from the App Store.</p>
  <a href="https://apps.apple.com/us/app/plateshift/id6764454446">Download PlateShift</a>
</body>
</html>
